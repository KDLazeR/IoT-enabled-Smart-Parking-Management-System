<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking Dashboard</title>
    <style>
        :root {
            --bg-base: #fdf6e3;         
            --bg-surface: #f4ead6;      
            --text-main: #4a3f35;       
            --text-muted: #796a5b;      
            
            --color-free: #7b9a6d;      
            --color-occupied: #b85c50;  
            --color-highlight: #d4a373;
            
            --shadow: 0 4px 12px rgba(74, 63, 53, 0.08);
            --border-radius: 12px;
            --transition-speed: 0.4s;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding-bottom: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
            border-bottom: 2px solid var(--bg-surface);
        }

        header h1 { font-size: 1.8rem; font-weight: 600; margin-bottom: 10px; }

        .counter-badge {
            display: inline-block;
            background-color: var(--text-main);
            color: var(--bg-base);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: var(--shadow);
        }

        h2 { font-size: 1.3rem; margin-bottom: 15px; color: var(--text-main); }
        section { margin-bottom: 40px; }

        /* Slot Grid */
        .slot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .slot-card {
            background-color: var(--bg-surface);
            border-radius: var(--border-radius);
            padding: 25px 20px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: all var(--transition-speed) ease;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .slot-card h3 { font-size: 2.2rem; }
        .slot-card .status { font-size: 1.1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        /* Customizable Driver Input */
        .driver-input {
            width: 100%;
            padding: 8px;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 6px;
            background-color: rgba(255,255,255,0.8);
            color: var(--text-main);
            font-size: 0.95rem;
            text-align: center;
            outline: none;
            display: none; 
        }
        
        .slot-card.free { background-color: var(--color-free); color: var(--bg-base); }
        .slot-card.occupied { background-color: var(--color-occupied); color: var(--bg-base); }
        .slot-card.occupied .driver-input { display: block; }
        .slot-card.loading { background-color: var(--bg-surface); color: var(--text-muted); }

        /* Latest Checkout Receipt */
        .receipt-card {
            background-color: var(--bg-surface);
            border-radius: var(--border-radius);
            padding: 30px;
            box-shadow: var(--shadow);
            text-align: center;
            border: 2px dashed var(--text-muted);
        }

        .receipt-card .rfid { font-size: 1.2rem; color: var(--text-muted); margin-bottom: 10px; }
        .receipt-card .fee { font-size: 2.5rem; font-weight: bold; color: var(--color-occupied); margin: 15px 0; }
        .receipt-card .duration { font-size: 1.1rem; color: var(--text-main); }

        .empty-receipt { text-align: center; color: var(--text-muted); font-style: italic; font-size: 1.1rem; }

        @media (max-width: 600px) {
            header h1 { font-size: 1.4rem; }
            .counter-badge { font-size: 1rem; }
            .receipt-card .fee { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Smart Parking Management System</h1>
            <div id="available-counter" class="counter-badge">Calculating Slots...</div>
        </header>

        <section>
            <h2>Live Slot Map</h2>
            <div class="slot-grid">
                <div class="slot-card loading" id="card-A1">
                    <h3>A1</h3>
                    <div class="status" id="status-A1">Connecting...</div>
                    <input type="text" id="name-A1" class="driver-input" placeholder="Tag: (e.g. UID or Plate)">
                </div>
                <div class="slot-card loading" id="card-A2">
                    <h3>A2</h3>
                    <div class="status" id="status-A2">Connecting...</div>
                    <input type="text" id="name-A2" class="driver-input" placeholder="Tag: (e.g. UID or Plate)">
                </div>
                <div class="slot-card loading" id="card-A3">
                    <h3>A3</h3>
                    <div class="status" id="status-A3">Connecting...</div>
                    <input type="text" id="name-A3" class="driver-input" placeholder="Tag: (e.g. UID or Plate)">
                </div>
            </div>
        </section>

        <section>
            <h2>Latest Checkout Receipt</h2>
            <div id="checkout-receipt" class="receipt-card">
                <div class="empty-receipt">Waiting for a vehicle to scan out...</div>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, onChildChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQ7aiMWt4rP33b9bt0CmzYb-0N6EFlBmw",
            databaseURL: "https://smart-parking-system-69023-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "smart-parking-system-69023"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- Live Slot & Name Logic ---
        const slots = ['A1', 'A2', 'A3'];
        const slotsRef = ref(db, 'slots');
        const namesRef = ref(db, 'slot_names');
        
        onValue(slotsRef, (snapshot) => {
            const data = snapshot.val() || {};
            let freeCount = 0;

            slots.forEach(slotId => {
                const status = data[slotId] || "Free";
                const cardEl = document.getElementById('card-' + slotId);
                const statusEl = document.getElementById('status-' + slotId);

                statusEl.innerText = status;
                cardEl.classList.remove('loading', 'free', 'occupied');
                cardEl.classList.add(status.toLowerCase()); 
                
                if (status === "Free") {
                    freeCount++;
                    document.getElementById('name-' + slotId).value = "";
                }
            });
            document.getElementById('available-counter').innerText = `${freeCount} / 3 Slots Available`;
        });

        // Listen for RFID pushes from the ESP32
        onValue(namesRef, (snapshot) => {
            const names = snapshot.val() || {};
            slots.forEach(slotId => {
                const inputEl = document.getElementById('name-' + slotId);
                if (document.activeElement !== inputEl) {
                    inputEl.value = names[slotId] || "";
                }
            });
        });

        // Allow manual renaming by the user
        slots.forEach(slotId => {
            document.getElementById('name-' + slotId).addEventListener('change', (e) => {
                set(ref(db, 'slot_names/' + slotId), e.target.value);
            });
        });

        // --- Latest Checkout Logic ---
        const usersRef = ref(db, 'users');
        const receiptEl = document.getElementById('checkout-receipt');

        // This listens specifically for when a user's data changes (like scanning out)
        onChildChanged(usersRef, (snapshot) => {
            const data = snapshot.val();
            const uid = snapshot.key;

            if (data.status === "Left") {
                const dur = parseFloat(data.last_duration || 0).toFixed(1);
                const feeAmt = parseFloat(data.last_fee || 0).toFixed(2);
                
                receiptEl.innerHTML = `
                    <div class="rfid">Vehicle Tag: <strong>${uid}</strong></div>
                    <div class="fee">Rs. ${feeAmt}</div>
                    <div class="duration">Total Duration: ${dur} seconds</div>
                `;
            }
        });
    </script>
</body>
</html>
