<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking Dashboard</title>
    <style>
        :root {
            --bg-base: #fdf6e3;         
            --bg-surface: #f4ead6;      
            --text-main: #4a3f35;       
            --text-muted: #796a5b;      
            
            --color-free: #7b9a6d;      
            --color-occupied: #b85c50;  
            --color-reserved: #4a90e2; 
            
            --shadow: 0 4px 12px rgba(74, 63, 53, 0.08);
            --border-radius: 12px;
            --transition-speed: 0.4s;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        .container { max-width: 900px; margin: 0 auto; padding-bottom: 40px; position: relative; }

        header { text-align: center; margin-bottom: 30px; padding: 20px 0; border-bottom: 2px solid var(--bg-surface); position: relative; }
        header h1 { font-size: 1.8rem; font-weight: 600; margin-bottom: 10px; }

        .admin-btn {
            position: absolute;
            top: 20px;
            right: 0;
            background-color: var(--text-muted);
            color: var(--bg-base);
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .admin-btn:hover { background-color: var(--text-main); }

        .counter-badge {
            display: inline-block;
            background-color: var(--text-main);
            color: var(--bg-base);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: var(--shadow);
            transition: all var(--transition-speed) ease;
        }

        h2 { font-size: 1.3rem; margin-bottom: 15px; color: var(--text-main); }
        section { margin-bottom: 40px; }

        .slot-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }

        .slot-card {
            background-color: var(--bg-surface);
            border-radius: var(--border-radius);
            padding: 25px 20px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: all var(--transition-speed) ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .slot-card h3 { font-size: 2.2rem; margin: 0; }
        .slot-card .status { font-size: 1.1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        
        .driver-id {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--bg-base); 
            min-height: 30px;
            letter-spacing: 1px;
        }

        .reserve-btn {
            background-color: rgba(255,255,255,0.9);
            color: var(--text-main);
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            display: none; 
            margin-top: 5px;
        }

        .reserve-btn:hover { background-color: #fff; }

        .slot-card.free { background-color: var(--color-free); color: var(--bg-base); }
        .slot-card.occupied { background-color: var(--color-occupied); color: var(--bg-base); }
        .slot-card.reserved { background-color: var(--color-reserved); color: var(--bg-base); }
        .slot-card.expecting { background-color: var(--color-occupied); color: var(--bg-base); }
        .slot-card.loading { background-color: var(--bg-surface); color: var(--text-muted); }

        .receipt-card {
            background-color: var(--bg-surface);
            border-radius: var(--border-radius);
            padding: 30px;
            box-shadow: var(--shadow);
            text-align: center;
            border: 2px dashed var(--text-muted);
        }

        .receipt-card .rfid { font-size: 1.3rem; color: var(--text-main); margin-bottom: 5px; }
        .receipt-card .fee { font-size: 2.5rem; font-weight: bold; color: var(--color-occupied); margin: 10px 0; }
        .receipt-card .details { font-size: 1.1rem; color: var(--text-muted); line-height: 1.8; }
        .empty-receipt { text-align: center; color: var(--text-muted); font-style: italic; font-size: 1.1rem; }

        /* Admin Modal Styling */
        .modal {
            display: none; 
            position: fixed; z-index: 100; left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: var(--bg-surface);
            margin: 15% auto; padding: 20px;
            border-radius: var(--border-radius);
            width: 300px; text-align: center;
            box-shadow: var(--shadow);
        }
        .modal-content input[type="time"] {
            margin: 10px 0 20px 0; padding: 8px; width: 80%;
            border: 1px solid var(--text-muted); border-radius: 4px;
        }
        .modal-content button {
            padding: 8px 15px; margin: 5px; border: none; border-radius: 4px;
            cursor: pointer; font-weight: bold;
        }
        .btn-save { background-color: var(--color-free); color: white; }
        .btn-cancel { background-color: var(--color-occupied); color: white; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <button class="admin-btn" onclick="requestAdmin()">Admin Panel</button>
            <h1>IoT+ Smart Parking Management System</h1>
            <div id="available-counter" class="counter-badge">Calculating Slots...</div>
        </header>

        <section>
            <h2>Live Slot Map</h2>
            <div class="slot-grid">
                <div class="slot-card loading" id="card-A1">
                    <h3>A1</h3>
                    <div class="status" id="status-A1">Connecting...</div>
                    <div class="driver-id" id="name-A1"></div>
                    <button class="reserve-btn" onclick="triggerReservation('A1')">Reserve Slot</button>
                </div>
                <div class="slot-card loading" id="card-A2">
                    <h3>A2</h3>
                    <div class="status" id="status-A2">Connecting...</div>
                    <div class="driver-id" id="name-A2"></div>
                    <button class="reserve-btn" onclick="triggerReservation('A2')">Reserve Slot</button>
                </div>
                <div class="slot-card loading" id="card-A3">
                    <h3>A3</h3>
                    <div class="status" id="status-A3">Connecting...</div>
                    <div class="driver-id" id="name-A3"></div>
                    <button class="reserve-btn" onclick="triggerReservation('A3')">Reserve Slot</button>
                </div>
            </div>
        </section>

        <section>
            <h2>Latest Checkout Receipt</h2>
            <div id="checkout-receipt" class="receipt-card">
                <div class="empty-receipt">Waiting for a vehicle to scan out...</div>
            </div>
        </section>
    </div>

    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h3>Set Peak Hours</h3>
            <label>Start Time:</label><br>
            <input type="time" id="peakStartInput"><br>
            <label>End Time:</label><br>
            <input type="time" id="peakEndInput"><br>
            <button class="btn-save" onclick="savePeakHours()">Save Config</button>
            <button class="btn-cancel" onclick="closeAdmin()">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, onChildChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQ7aiMWt4rP33b9bt0CmzYb-0N6EFlBmw",
            databaseURL: "https://smart-parking-system-69023-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "smart-parking-system-69023"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // -- ADMIN PANEL LOGIC --
        let currentPeakStart = "";
        let currentPeakEnd = "";

        onValue(ref(db, 'config'), (snapshot) => {
            const data = snapshot.val() || {};
            currentPeakStart = data.peak_start || "";
            currentPeakEnd = data.peak_end || "";
        });

        window.requestAdmin = function() {
            let pwd = prompt("Enter Admin Password:");
            if (pwd === "0032") {
                document.getElementById("peakStartInput").value = currentPeakStart;
                document.getElementById("peakEndInput").value = currentPeakEnd;
                document.getElementById("adminModal").style.display = "block";
            } else if (pwd !== null) {
                alert("Incorrect Password!");
            }
        };

        window.closeAdmin = function() {
            document.getElementById("adminModal").style.display = "none";
        };

        window.savePeakHours = function() {
            let start = document.getElementById("peakStartInput").value;
            let end = document.getElementById("peakEndInput").value;
            set(ref(db, 'config/peak_start'), start);
            set(ref(db, 'config/peak_end'), end);
            alert("Peak Hours Updated Successfully!");
            closeAdmin();
        };

        // -- RESERVATION LOGIC --
        window.triggerReservation = function(slotId) {
            let code = prompt("Enter User Code (e.g., 001 or 002):", "001");
            if (code === "001" || code === "002") {
                let resId = "RES-" + code;
                set(ref(db, 'slots/' + slotId), "Reserved");
                set(ref(db, 'slot_names/' + slotId), resId);
            } else {
                alert("Invalid Reservation Code!");
            }
        };

        const slots = ['A1', 'A2', 'A3'];
        const slotsRef = ref(db, 'slots');
        const namesRef = ref(db, 'slot_names');
        
        let currentSlots = {};
        let currentNames = {};

        function updateDashboard() {
            let freeCount = 0;

            slots.forEach(slotId => {
                const status = currentSlots[slotId] || "Free";
                const assignedName = (currentNames[slotId] || "").trim();

                const cardEl = document.getElementById('card-' + slotId);
                const statusEl = document.getElementById('status-' + slotId);
                const nameEl = document.getElementById('name-' + slotId);
                const btnEl = cardEl.querySelector('.reserve-btn');

                statusEl.innerText = status;
                cardEl.className = 'slot-card ' + status.toLowerCase();
                nameEl.innerText = assignedName;

                if (status === "Free" && assignedName === "") {
                    freeCount++;
                    btnEl.style.display = "inline-block"; 
                } else {
                    btnEl.style.display = "none"; 
                }
            });

            document.getElementById('available-counter').innerText = `${freeCount} / 3 Slots Available`;
        }

        onValue(slotsRef, (snapshot) => { currentSlots = snapshot.val() || {}; updateDashboard(); });
        onValue(namesRef, (snapshot) => { currentNames = snapshot.val() || {}; updateDashboard(); });

        // -- RECEIPT LOGIC --
        const usersRef = ref(db, 'users');
        const receiptEl = document.getElementById('checkout-receipt');

        onChildChanged(usersRef, (snapshot) => {
            const data = snapshot.val();
            const uid = snapshot.key; 

            if (data.status === "Left") {
                const dur = parseInt(data.last_duration || 0);
                const durFee = parseInt(data.duration_fee || 0);
                const resFee = parseInt(data.res_fee || 0);
                const peakFee = parseInt(data.peak_fee || 0);
                const totalFee = parseInt(data.last_fee || 0);
                
                let resHtml = resFee > 0 ? `<br>Reservation Charge: Rs. ${resFee}` : "";
                let peakHtml = peakFee > 0 ? `<br>Peak Time Charge (15%): Rs. ${peakFee}` : "";

                receiptEl.innerHTML = `
                    <div class="rfid">Assigned ID: <strong>${uid}</strong></div>
                    <div class="fee">Rs. ${totalFee}</div>
                    <div class="details">
                        Total Duration: ${dur} seconds<br>
                        Duration Fee: Rs. ${durFee}
                        ${resHtml}
                        ${peakHtml}
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
